services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: portlog
      POSTGRES_PASSWORD: portlog_dev
      POSTGRES_DB: portlog
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U portlog']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-portlog}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-portlog_dev}
    volumes:
      - minio-dev-data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-portlog} $${MINIO_ROOT_PASSWORD:-portlog_dev};
        mc mb --ignore-existing local/sgc-documents;
        exit 0;
      "

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - '1025:1025' # SMTP — NestJS sends here in dev
      - '8025:8025' # Web UI — http://localhost:8025
    restart: unless-stopped

volumes:
  postgres-dev-data:
  minio-dev-data:
